<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇮🇹 Leitner Italian</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --wood:#2c1f14;--wood2:#3d2b1a;--card-bg:#f5f0e8;--card-line:#e0d8cc;
  --text-dark:#1a1209;--text-mid:#5a4a3a;--accent:#c9813a;--accent2:#4a8c6a;
  --danger:#c04040;--border:rgba(255,255,255,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--wood);
  background-image:repeating-linear-gradient(90deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.04) 4px),
    repeating-linear-gradient(0deg,transparent,transparent 8px,rgba(0,0,0,0.02) 8px,rgba(0,0,0,0.02) 10px);
  min-height:100vh; font-family:'Inter',sans-serif; color:#f0ead8; padding-bottom:60px;
}
.header{
  background:rgba(0,0,0,0.45); border-bottom:1px solid var(--border);
  padding:13px 20px; display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100; backdrop-filter:blur(8px);
}
.logo{font-family:'Lora',serif;font-size:1.25rem;color:#f0d8a0;}
.logo em{font-style:italic;color:#f0ead8;}
.hdr-sub{font-size:0.7rem;color:rgba(240,216,160,0.5);margin-top:1px;}
.hbtns{display:flex;gap:8px;align-items:center;}
.hbtn{
  background:rgba(255,255,255,0.08);border:1px solid var(--border);color:#f0ead8;
  padding:7px 13px;border-radius:8px;font-family:'Inter',sans-serif;font-size:0.78rem;
  cursor:pointer;transition:background 0.15s;
}
.hbtn:hover{background:rgba(255,255,255,0.16);}
.hbtn.primary{background:var(--accent);color:#1a0a00;border-color:transparent;font-weight:600;}
.hbtn.primary:hover{background:#d9924a;}
.sync-dot{
  width:8px;height:8px;border-radius:50%;background:#4a4;display:inline-block;margin-right:5px;
  transition:background 0.3s;
}
.sync-dot.syncing{background:#c9813a;animation:pulse 1s infinite;}
.sync-dot.error{background:#c04040;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

.boxes-row{
  display:flex;gap:10px;padding:18px 18px 8px;overflow-x:auto;scrollbar-width:none;
}
.boxes-row::-webkit-scrollbar{display:none;}
.box{
  flex:1;min-width:88px;background:rgba(0,0,0,0.28);border:1px solid var(--border);
  border-radius:10px;padding:11px 8px;cursor:pointer;transition:all 0.18s;
  text-align:center;position:relative;overflow:hidden;
}
.box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0;}
.bx0::before{background:#c04040;}.bx1::before{background:#c9813a;}
.bx2::before{background:#c9c040;}.bx3::before{background:#4a8c6a;}
.bx4::before{background:#4a7c8c;}.bx5::before{background:#7c4a8c;}
.box:hover{background:rgba(255,255,255,0.08);transform:translateY(-2px);}
.box.active{background:rgba(255,255,255,0.13);transform:translateY(-2px);box-shadow:0 4px 18px rgba(0,0,0,0.4);}
.box-num{font-size:1.45rem;font-weight:600;color:#f0d8a0;font-family:'Lora',serif;}
.box-lbl{font-size:0.62rem;text-transform:uppercase;letter-spacing:0.1em;color:rgba(240,216,160,0.5);margin-top:2px;}

.list-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 8px;}
.list-title{font-family:'Lora',serif;font-size:0.95rem;color:#f0d8a0;}
.srch-wrap{position:relative;}
.srch{
  background:rgba(0,0,0,0.28);border:1px solid var(--border);border-radius:8px;
  color:#f0ead8;padding:6px 10px 6px 28px;font-family:'Inter',sans-serif;
  font-size:0.78rem;width:170px;outline:none;transition:border-color 0.15s;
}
.srch::placeholder{color:rgba(240,216,160,0.3);}
.srch:focus{border-color:var(--accent);}
.srch-ico{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:0.72rem;opacity:0.45;}

.word-list{padding:0 14px;}
.wcard{
  background:var(--card-bg);border-radius:10px;margin-bottom:7px;padding:13px 14px;
  display:flex;align-items:center;gap:11px;color:var(--text-dark);position:relative;
  cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;
}
.wcard:hover{transform:translateX(3px);box-shadow:-3px 0 0 var(--accent);}
.wcard.expanded{border-radius:10px 10px 0 0;margin-bottom:0;}
.lvl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.d0{background:#c04040;}.d1{background:#c9813a;}.d2{background:#b8b830;}
.d3{background:#4a8c6a;}.d4{background:#4a7c8c;}.d5{background:#7c4a8c;}
.wmain{flex:1;min-width:0;}
.wen{font-family:'Lora',serif;font-size:0.92rem;font-weight:600;color:var(--text-dark);}
.wit{font-size:0.8rem;color:var(--text-mid);font-style:italic;margin-top:1px;}
.wmeta{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.dbadge{font-size:0.66rem;padding:2px 7px;border-radius:10px;background:rgba(0,0,0,0.07);color:var(--text-mid);white-space:nowrap;}
.dbadge.fresh{background:#ffeaea;color:#c04040;}
.dbadge.recent{background:#fff6e8;color:#c9813a;}
.dbadge.old{background:#e8f8ee;color:#2a6a4a;}
.cactions{display:flex;gap:3px;}
.abtn{
  background:none;border:none;cursor:pointer;width:27px;height:27px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-size:0.82rem;
  transition:background 0.15s;color:var(--text-mid);
}
.abtn:hover{background:rgba(0,0,0,0.09);}
.abtn.del:hover{background:#fde8e8;color:#c04040;}
.abtn.edit:hover{background:#e8f0fe;color:#2a5ac9;}
.wexp{
  background:#ede8df;border-radius:0 0 10px 10px;margin-bottom:7px;
  padding:11px 14px;font-size:0.8rem;color:var(--text-mid);line-height:1.6;
  white-space:pre-wrap;display:none;
}
.wexp.show{display:block;}
.lvl-sel{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;}
.lvlbtn{
  font-size:0.66rem;padding:2px 8px;border-radius:8px;border:none;cursor:pointer;
  font-family:'Inter',sans-serif;background:rgba(0,0,0,0.09);color:var(--text-mid);transition:all 0.15s;
}
.lvlbtn:hover{background:rgba(0,0,0,0.18);}
.lb0.cur{background:#c04040;color:#fff;font-weight:600;}
.lb1.cur{background:#c9813a;color:#fff;font-weight:600;}
.lb2.cur{background:#b8b830;color:#1a1a00;font-weight:600;}
.lb3.cur{background:#4a8c6a;color:#fff;font-weight:600;}
.lb4.cur{background:#4a7c8c;color:#fff;font-weight:600;}
.lb5.cur{background:#7c4a8c;color:#fff;font-weight:600;}

/* Study */
.study-ov{
  display:none;position:fixed;inset:0;background:var(--wood);z-index:200;
  flex-direction:column;align-items:center;justify-content:center;padding:24px;
}
.study-ov.show{display:flex;}
.study-hdr{
  position:absolute;top:0;left:0;right:0;padding:13px 18px;
  display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.3);
}
.s-prog{font-size:0.76rem;color:rgba(240,216,160,0.6);}
.s-card{
  width:100%;max-width:440px;background:var(--card-bg);border-radius:16px;
  min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:36px 28px;text-align:center;cursor:pointer;position:relative;
  transform-style:preserve-3d;transition:transform 0.5s;box-shadow:0 8px 40px rgba(0,0,0,0.5);
}
.s-card.flipped{transform:rotateY(180deg);}
.s-face{
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:36px 28px;border-radius:16px;
}
.s-back{transform:rotateY(180deg);background:var(--card-bg);justify-content:flex-start;padding-top:24px;}
.s-lbl{font-size:0.66rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin-bottom:14px;}
.s-word{font-family:'Lora',serif;font-size:1.9rem;color:var(--text-dark);line-height:1.2;}
.s-it{font-family:'Lora',serif;font-size:1.7rem;color:var(--accent);font-style:italic;margin-bottom:10px;}
.s-det{font-size:0.78rem;color:var(--text-mid);line-height:1.6;text-align:left;width:100%;border-top:1px solid var(--card-line);padding-top:10px;max-height:90px;overflow-y:auto;white-space:pre-wrap;}
.s-hint{font-size:0.78rem;color:var(--text-mid);margin-top:14px;}
.s-lvlb{position:absolute;top:13px;right:13px;font-size:0.66rem;padding:3px 8px;border-radius:8px;font-weight:600;}
.s-acts{margin-top:22px;display:flex;gap:10px;width:100%;max-width:440px;}
.sa{flex:1;padding:12px;border:none;border-radius:11px;font-family:'Inter',sans-serif;font-size:0.86rem;font-weight:600;cursor:pointer;transition:opacity 0.15s;}
.sa:active{transform:scale(0.97);}
.sa-again{background:#2a1010;color:#e07070;border:1px solid #4a1818;}
.sa-good{background:#0a2a18;color:#70c890;border:1px solid #184a28;}
.sa-flip{background:var(--accent);color:#1a0500;max-width:190px;}
#s-fr{display:flex;width:100%;max-width:440px;gap:10px;margin-top:20px;justify-content:center;}
#s-ar{display:none;width:100%;max-width:440px;gap:10px;margin-top:20px;}

/* Modal */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:300;align-items:center;justify-content:center;padding:20px;}
.mbg.show{display:flex;}
.modal{background:#2a1e13;border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:26px;width:100%;max-width:440px;}
.modal h3{font-family:'Lora',serif;color:#f0d8a0;margin-bottom:18px;font-size:1.15rem;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:0.72rem;color:rgba(240,216,160,0.55);margin-bottom:4px;letter-spacing:0.06em;text-transform:uppercase;}
.field input,.field textarea,.field select{
  width:100%;background:rgba(0,0,0,0.28);border:1px solid rgba(255,255,255,0.1);
  border-radius:8px;color:#f0ead8;padding:8px 11px;font-family:'Inter',sans-serif;
  font-size:0.86rem;outline:none;transition:border-color 0.15s;
}
.field input:focus,.field textarea:focus{border-color:var(--accent);}
.field textarea{resize:vertical;min-height:75px;}
.field select option{background:#2a1e13;}
.mbtns{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}
.mbtn{padding:8px 18px;border-radius:8px;font-family:'Inter',sans-serif;font-size:0.83rem;font-weight:600;cursor:pointer;border:none;}
.mc{background:rgba(255,255,255,0.08);color:#f0ead8;}
.ms{background:var(--accent);color:#1a0500;}
.ms:hover{opacity:0.88;}
.ms:disabled{opacity:0.5;cursor:not-allowed;}

/* Confirm */
.cbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:400;align-items:center;justify-content:center;}
.cbg.show{display:flex;}
.cbox{background:#2a1e13;border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:22px;max-width:300px;text-align:center;}
.cbox h4{font-family:'Lora',serif;color:#f0d8a0;margin-bottom:7px;}
.cbox p{font-size:0.8rem;color:rgba(240,216,160,0.55);margin-bottom:16px;}
.cbtns{display:flex;gap:10px;justify-content:center;}
.cno{background:rgba(255,255,255,0.08);color:#f0ead8;padding:7px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'Inter',sans-serif;}
.cyes{background:var(--danger);color:white;padding:7px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;}
.cyes:disabled{opacity:0.5;cursor:not-allowed;}

.empty{text-align:center;padding:36px;color:rgba(240,216,160,0.38);font-size:0.88rem;}
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#1a2e1a;border:1px solid #2a5a2a;color:#90d890;
  padding:9px 20px;border-radius:10px;font-size:0.82rem;z-index:500;
  opacity:0;transition:opacity 0.3s;pointer-events:none;
}
.toast.show{opacity:1;}
.toast.err{background:#2e1a1a;border-color:#5a2a2a;color:#d89090;}
@keyframes fi{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
.wcard{animation:fi 0.22s ease both;}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">&#127470;&#127481; Leitner <em>Italian</em></div>
    <div class="hdr-sub" id="hdr-sub">Connecting to Notion...</div>
  </div>
  <div class="hbtns">
    <span><span class="sync-dot syncing" id="sync-dot"></span><span id="sync-txt" style="font-size:0.72rem;color:rgba(240,216,160,0.5)">Syncing</span></span>
    <button class="hbtn" onclick="openStudy()">&#9654; Study</button>
    <button class="hbtn primary" onclick="openAdd()">+ Add Word</button>
  </div>
</div>

<div class="boxes-row" id="boxes-row"></div>

<div class="list-hdr">
  <div class="list-title" id="list-title">All Words</div>
  <div class="srch-wrap">
    <span class="srch-ico">&#128269;</span>
    <input class="srch" id="srch" placeholder="Search..." oninput="renderList()">
  </div>
</div>
<div class="word-list" id="word-list"></div>

<!-- Study overlay -->
<div class="study-ov" id="study-ov">
  <div class="study-hdr">
    <button class="hbtn" onclick="closeStudy()">&#8592; Back</button>
    <div class="s-prog" id="s-prog"></div>
    <div style="width:70px"></div>
  </div>
  <div class="s-card" id="s-card" onclick="sFlip()">
    <div class="s-face">
      <div class="s-lbl">English &#8594; Italian</div>
      <div class="s-word" id="s-en"></div>
      <div class="s-hint">tap to reveal</div>
      <span class="s-lvlb" id="s-badge1"></span>
    </div>
    <div class="s-face s-back">
      <div class="s-lbl">Italian</div>
      <div class="s-it" id="s-it"></div>
      <div class="s-det" id="s-det"></div>
      <span class="s-lvlb" id="s-badge2"></span>
    </div>
  </div>
  <div id="s-fr"><button class="sa sa-flip" onclick="sFlip()">Reveal</button><button class="sa" style="background:rgba(255,255,255,0.06);color:#aaa;flex:0;padding:12px 16px" onclick="sSkip()">Skip</button></div>
  <div id="s-ar"><button class="sa sa-again" onclick="sAns(false)">&#10007; Again</button><button class="sa sa-good" onclick="sAns(true)">&#10003; Got it</button></div>
</div>

<!-- Modal -->
<div class="mbg" id="mbg">
  <div class="modal">
    <h3 id="mtitle">Add New Word</h3>
    <div class="field"><label>English / Meaning</label><input id="f-en" placeholder="e.g. to run"></div>
    <div class="field"><label>Italian Word</label><input id="f-it" placeholder="e.g. correre"></div>
    <div class="field"><label>Notes / Conjugation</label><textarea id="f-det" placeholder="io corro&#10;tu corri..."></textarea></div>
    <div class="field"><label>Level</label>
      <select id="f-lvl">
        <option value="0">0 – Just added</option><option value="1">1 – Seen once</option>
        <option value="2">2 – Getting there</option><option value="3">3 – Pretty good</option>
        <option value="4">4 – Almost mastered</option><option value="5">5 – Mastered</option>
      </select>
    </div>
    <div class="mbtns">
      <button class="mbtn mc" onclick="closeMod()">Cancel</button>
      <button class="mbtn ms" id="msave" onclick="saveWord()">Save to Notion</button>
    </div>
  </div>
</div>

<!-- Confirm delete -->
<div class="cbg" id="cbg">
  <div class="cbox">
    <h4>Delete word?</h4>
    <p id="cmsg"></p>
    <div class="cbtns">
      <button class="cno" onclick="closeConf()">Cancel</button>
      <button class="cyes" id="cyes" onclick="confirmDel()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

", "it": "avere successo", "level": 0, "days": null, "details": "avere successo\n\n- Ha molto successo nel suo lavoro\n\n---\n\n- e sucesso\n    \n    happened\n    \n    che cosa e successo"}];

var cards = [];
var nextLocalId = 0;
var activeLevel = -1;
var editingId = null;
var deletePageId = null;
var expandedId = null;
var sQueue = [], sIdx = 0, sDone = 0, sFlipped = false;

// Notion API helpers
function nHeaders(extra) {
  var h = {
    "Authorization": "Bearer " + TOKEN,
    "Notion-Version": NOTION_VER,
    "Content-Type": "application/json"
  };
  return Object.assign(h, extra||{});
}

function nReq(method, path, body) {
  return fetch(NOTION_API + path, {
    method: method,
    headers: nHeaders(),
    body: body ? JSON.stringify(body) : undefined
  }).then(function(r){ return r.json(); });
}

// Load all pages from Notion
function loadFromNotion() {
  setSyncing(true);
  var all = [];
  function fetchPage(cursor) {
    var body = { page_size: 100, filter: {} };
    if (cursor) body.start_cursor = cursor;
    return nReq("POST", "/databases/" + DB_ID + "/query", body)
      .then(function(data) {
        if (data.results) {
          data.results.forEach(function(p) {
            var props = p.properties || {};
            var name = '';
            if (props.Name && props.Name.title && props.Name.title[0])
              name = props.Name.title[0].plain_text;
            var level = 0;
            if (props.Level && props.Level.select)
              level = parseInt(props.Level.select.name) || 0;
            var dateStr = null;
            if (props.Date && props.Date.date && props.Date.date.start)
              dateStr = props.Date.date.start;
            var days = null;
            if (dateStr) {
              var d = new Date(dateStr);
              days = Math.max(0, Math.floor((Date.now() - d.getTime()) / 86400000));
            }
            // Find seed match for italian/details
            var seed = SEED.find(function(s){ return s.en === name; });
            all.push({
              id: nextLocalId++,
              pageId: p.id,
              en: name,
              it: seed ? seed.it : '',
              level: level,
              days: days,
              details: seed ? seed.details : ''
            });
          });
          if (data.has_more && data.next_cursor) return fetchPage(data.next_cursor);
        }
        return all;
      });
  }
  return fetchPage(null).then(function(result) {
    cards = result.filter(function(c){ return c.en && c.en !== 'Untitled'; });
    setSyncing(false);
    document.getElementById('hdr-sub').textContent = cards.length + ' words synced from Notion';
    renderBoxes(); renderList();
  }).catch(function(e) {
    setSyncError();
    // Fallback to seed data
    cards = SEED.map(function(s,i) {
      return {id:i,pageId:'',en:s.en,it:s.it,level:s.level,days:s.days,details:s.details};
    });
    nextLocalId = cards.length;
    document.getElementById('hdr-sub').textContent = cards.length + ' words (offline mode)';
    renderBoxes(); renderList();
  });
}

function setSyncing(on) {
  var dot = document.getElementById('sync-dot');
  var txt = document.getElementById('sync-txt');
  dot.className = 'sync-dot' + (on ? ' syncing' : '');
  txt.textContent = on ? 'Syncing...' : 'Synced';
}
function setSyncError() {
  var dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot error';
  document.getElementById('sync-txt').textContent = 'Offline';
}

// Update page level in Notion
function updateLevel(pageId, level) {
  if (!pageId) return Promise.resolve();
  setSyncing(true);
  return nReq("PATCH", "/pages/" + pageId, {
    properties: {
      "Level": { select: { name: String(level) } },
      "Date": { date: { start: new Date().toISOString().split("T")[0] } }
    }
  }).then(function() { setSyncing(false); })
    .catch(function() { setSyncError(); });
}

// Create new page in Notion
function createNotionPage(en, it, details, level) {
  setSyncing(true);
  var content = it ? (it + (details ? "\n\n" + details : "")) : (details || "");
  return nReq("POST", "/pages", {
    parent: { database_id: DB_ID },
    properties: {
      "Name": { title: [{ text: { content: en } }] },
      "Level": { select: { name: String(level) } },
      "Date": { date: { start: new Date().toISOString().split("T")[0] } }
    }
  }).then(function(data) {
    setSyncing(false);
    return data.id || '';
  }).catch(function() { setSyncError(); return ''; });
}

// Delete (archive) page in Notion
function deleteNotionPage(pageId) {
  if (!pageId) return Promise.resolve();
  setSyncing(true);
  return nReq("PATCH", "/pages/" + pageId, { archived: true })
    .then(function() { setSyncing(false); })
    .catch(function() { setSyncError(); });
}

// UI helpers
function lvlColor(l) { return ['#c04040','#c9813a','#b8b830','#4a8c6a','#4a7c8c','#7c4a8c'][l]||'#888'; }
function lvlName(l) { return ['New','Box 1','Box 2','Box 3','Box 4','Box 5'][l]||'Box '+l; }
function daysLbl(d) {
  if (d===null||d===undefined) return 'no date';
  if (d===0) return 'today'; if (d===1) return '1 day ago';
  return d + ' days ago';
}
function daysCls(d) {
  if (!d) return ''; if (d<=1) return 'fresh'; if (d<=7) return 'recent'; return 'old';
}
function esc(s){ var d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }

function showToast(msg, err) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err?' err':'');
  clearTimeout(t._tid);
  t._tid = setTimeout(function(){ t.classList.remove('show'); }, 2800);
}

function renderBoxes() {
  var counts = [0,0,0,0,0,0];
  cards.forEach(function(c){ if(c.level>=0&&c.level<=5) counts[c.level]++; });
  var labels = ['New','Box 1','Box 2','Box 3','Box 4','Box 5'];
  var row = document.getElementById('boxes-row');
  row.innerHTML = '';
  var all = document.createElement('div');
  all.className = 'box'+(activeLevel===-1?' active':'');
  all.innerHTML = '<div class="box-num">'+cards.length+'</div><div class="box-lbl">All</div>';
  all.onclick = function(){ activeLevel=-1; renderBoxes(); renderList(); };
  row.appendChild(all);
  for (var i=0;i<=5;i++) {
    var b = document.createElement('div');
    b.className = 'box bx'+i+(activeLevel===i?' active':'');
    b.innerHTML = '<div class="box-num">'+counts[i]+'</div><div class="box-lbl">'+labels[i]+'</div>';
    (function(lv){ b.onclick = function(){ activeLevel=lv; renderBoxes(); renderList(); }; })(i);
    row.appendChild(b);
  }
}

function getFiltered() {
  var q = document.getElementById('srch').value.trim().toLowerCase();
  return cards.filter(function(c) {
    return (activeLevel===-1||c.level===activeLevel) &&
      (!q||(c.en.toLowerCase().includes(q)||c.it.toLowerCase().includes(q)));
  });
}

function renderList() {
  var filtered = getFiltered();
  var lbl = activeLevel===-1 ? 'All Words' : lvlName(activeLevel);
  document.getElementById('list-title').textContent = lbl+' ('+filtered.length+')';
  var el = document.getElementById('word-list');
  if (!filtered.length) { el.innerHTML='<div class="empty">No words found</div>'; return; }
  el.innerHTML = '';
  filtered.forEach(function(c, i) {
    var wrap = document.createElement('div');
    var card = document.createElement('div');
    card.className = 'wcard'+(expandedId===c.id?' expanded':'');
    card.style.animationDelay = (i*0.018)+'s';
    card.innerHTML =
      '<div class="lvl-dot d'+c.level+'"></div>'+
      '<div class="wmain">'+
        '<div class="wen">'+esc(c.en)+'</div>'+
        (c.it?'<div class="wit">'+esc(c.it)+'</div>':'')+
      '</div>'+
      '<div class="wmeta">'+
        '<span class="dbadge '+daysCls(c.days)+'">'+daysLbl(c.days)+'</span>'+
        '<div class="cactions">'+
          '<button class="abtn edit" title="Edit" onclick="event.stopPropagation();openEdit('+c.id+')">&#9998;</button>'+
          '<button class="abtn del" title="Delete" onclick="event.stopPropagation();askDel('+c.id+')">&#128465;</button>'+
        '</div>'+
      '</div>';
    card.onclick = function(){ toggleExp(c.id); };

    var exp = document.createElement('div');
    exp.className = 'wexp'+(expandedId===c.id?' show':'');
    var detHtml = c.details ? '<div style="margin-bottom:9px">'+esc(c.details)+'</div>' : '';
    var lvBtns = '<div style="font-size:0.7rem;color:#888;margin-bottom:4px">Move to level:</div><div class="lvl-sel">';
    for (var lv=0;lv<=5;lv++) {
      lvBtns += '<button class="lvlbtn lb'+lv+(c.level===lv?' cur':'')+'" onclick="moveLevel('+c.id+','+lv+')">'+lv+' – '+lvlName(lv)+'</button>';
    }
    lvBtns += '</div>';
    exp.innerHTML = detHtml + lvBtns;

    wrap.appendChild(card); wrap.appendChild(exp); el.appendChild(wrap);
  });
}

function toggleExp(id) { expandedId=(expandedId===id?null:id); renderList(); }

function moveLevel(id, lv) {
  var c = cards.find(function(x){ return x.id===id; });
  if (!c) return;
  c.level = lv; c.days = 0;
  updateLevel(c.pageId, lv).then(function(){
    showToast('Moved "'+c.en+'" to Level '+lv);
  });
  renderBoxes(); renderList();
}

// Add / Edit
function openAdd() {
  editingId = null;
  document.getElementById('mtitle').textContent = 'Add New Word';
  document.getElementById('f-en').value='';
  document.getElementById('f-it').value='';
  document.getElementById('f-det').value='';
  document.getElementById('f-lvl').value='0';
  document.getElementById('msave').textContent = 'Save to Notion';
  document.getElementById('mbg').classList.add('show');
  document.getElementById('f-en').focus();
}

function openEdit(id) {
  var c = cards.find(function(x){ return x.id===id; });
  if (!c) return;
  editingId = id;
  document.getElementById('mtitle').textContent = 'Edit Word';
  document.getElementById('f-en').value = c.en;
  document.getElementById('f-it').value = c.it;
  document.getElementById('f-det').value = c.details;
  document.getElementById('f-lvl').value = c.level;
  document.getElementById('msave').textContent = 'Save Changes';
  document.getElementById('mbg').classList.add('show');
}

function closeMod() { document.getElementById('mbg').classList.remove('show'); }

function saveWord() {
  var en = document.getElementById('f-en').value.trim();
  var it = document.getElementById('f-it').value.trim();
  var det = document.getElementById('f-det').value.trim();
  var lv = parseInt(document.getElementById('f-lvl').value);
  if (!en) { showToast('Please enter the English meaning', true); return; }
  var btn = document.getElementById('msave');
  btn.disabled = true; btn.textContent = 'Saving...';

  if (editingId !== null) {
    var c = cards.find(function(x){ return x.id===editingId; });
    if (c) {
      c.en=en; c.it=it; c.details=det; c.level=lv;
      // Update in Notion
      if (c.pageId) {
        nReq("PATCH", "/pages/"+c.pageId, {
          properties:{
            "Name":{title:[{text:{content:en}}]},
            "Level":{select:{name:String(lv)}}
          }
        }).then(function(){
          btn.disabled=false; btn.textContent='Save Changes';
          closeMod(); renderBoxes(); renderList();
          showToast('Updated "'+en+'"');
        });
      } else {
        btn.disabled=false; btn.textContent='Save Changes';
        closeMod(); renderBoxes(); renderList(); showToast('Updated locally');
      }
    }
  } else {
    createNotionPage(en, it, det, lv).then(function(pageId) {
      cards.unshift({id:nextLocalId++,pageId:pageId,en:en,it:it,level:lv,days:0,details:det});
      btn.disabled=false; btn.textContent='Save to Notion';
      closeMod(); renderBoxes(); renderList();
      showToast('Added "'+en+'" to Notion ✓');
    });
  }
}

// Delete
function askDel(id) {
  var c = cards.find(function(x){ return x.id===id; });
  if (!c) return;
  deletePageId = id;
  document.getElementById('cmsg').textContent = 'Delete "'+c.en+'"?';
  document.getElementById('cbg').classList.add('show');
}
function closeConf() { document.getElementById('cbg').classList.remove('show'); }
function confirmDel() {
  var c = cards.find(function(x){ return x.id===deletePageId; });
  if (!c) { closeConf(); return; }
  var btn = document.getElementById('cyes');
  btn.disabled=true; btn.textContent='Deleting...';
  deleteNotionPage(c.pageId).then(function(){
    cards = cards.filter(function(x){ return x.id!==deletePageId; });
    btn.disabled=false; btn.textContent='Delete';
    closeConf(); renderBoxes(); renderList();
    showToast('Deleted "'+c.en+'"');
  });
}

// Study
function openStudy() {
  var filtered = getFiltered();
  if (!filtered.length) { showToast('No words to study!', true); return; }
  sQueue = filtered.slice().sort(function(){ return Math.random()-0.5; });
  sIdx=0; sDone=0; sFlipped=false;
  document.getElementById('study-ov').classList.add('show');
  showSCard();
}
function closeStudy() { document.getElementById('study-ov').classList.remove('show'); }
function showSCard() {
  sFlipped=false;
  document.getElementById('s-card').classList.remove('flipped');
  document.getElementById('s-fr').style.display='flex';
  document.getElementById('s-ar').style.display='none';
  if (sIdx>=sQueue.length) { showSDone(); return; }
  var c=sQueue[sIdx];
  document.getElementById('s-en').textContent=c.en;
  document.getElementById('s-it').textContent=c.it||'—';
  document.getElementById('s-det').textContent=c.details||'';
  var col=lvlColor(c.level);
  ['s-badge1','s-badge2'].forEach(function(id){
    var el=document.getElementById(id);
    el.textContent='Lv '+c.level;
    el.style.background=col+'33'; el.style.color=col;
  });
  document.getElementById('s-prog').textContent=(sIdx+1)+'/'+sQueue.length+' ✓ '+sDone;
}
function sFlip() {
  if(sFlipped) return; sFlipped=true;
  document.getElementById('s-card').classList.add('flipped');
  document.getElementById('s-fr').style.display='none';
  document.getElementById('s-ar').style.display='flex';
}
function sSkip() { sIdx++; showSCard(); }
function sAns(ok) { if(ok) sDone++; sIdx++; showSCard(); }
function showSDone() {
  document.getElementById('s-card').innerHTML=
    '<div style="text-align:center;padding:20px">'+
    '<div style="font-family:Lora,serif;font-size:1.9rem;color:var(--accent);margin-bottom:10px">Bravissimo! &#127881;</div>'+
    '<div style="color:var(--text-mid);font-size:0.88rem">'+sDone+' / '+sQueue.length+' cards done</div>'+
    '<button onclick="openStudy()" style="margin-top:18px;background:var(--accent);color:#1a0500;border:none;padding:10px 22px;border-radius:10px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif">Go again</button></div>';
  document.getElementById('s-fr').style.display='none';
  document.getElementById('s-ar').style.display='none';
}

document.addEventListener('keydown',function(e){
  if (document.getElementById('study-ov').classList.contains('show')) {
    if(e.code==='Space'){e.preventDefault();if(!sFlipped)sFlip();}
    if(e.code==='ArrowRight'&&sFlipped) sAns(true);
    if(e.code==='ArrowLeft'&&sFlipped) sAns(false);
    if(e.code==='ArrowDown'){e.preventDefault();sSkip();}
    if(e.code==='Escape') closeStudy();
  }
  if(e.code==='Escape'){
    closeMod(); closeConf();
  }
});
document.getElementById('mbg').onclick=function(e){if(e.target===this)closeMod();};

loadFromNotion();
</script>
